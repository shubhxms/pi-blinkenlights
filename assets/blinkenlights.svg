<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title description">
  <title id="title">Blinkenlights</title>
  <desc id="description">A playful editorial systems card for Pi Caps Lock LED notifications.</desc>
  <defs>
    <radialGradient id="lamp">
      <stop offset="0" stop-color="#fffde7"/>
      <stop offset="0.3" stop-color="#f2df6f"/>
      <stop offset="1" stop-color="#b99e28"/>
    </radialGradient>
    <pattern id="paper" width="19" height="19" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="0.65" fill="#27252a" opacity="0.04"/>
      <circle cx="15" cy="12" r="0.5" fill="#6979b8" opacity="0.035"/>
    </pattern>
    <filter id="lampGlow" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="#e4ddd3"/>
  <rect x="12" y="12" width="1176" height="476" rx="3" fill="#f3eee5" stroke="#27252a" stroke-width="2"/>
  <rect x="12" y="12" width="1176" height="476" rx="3" fill="url(#paper)"/>
  <rect x="12" y="12" width="324" height="476" fill="#d9d6e7" opacity="0.72"/>

  <path d="M336 12V488" stroke="#27252a" stroke-width="2"/>
  <path d="M370 60H1147" stroke="#aaa39b"/>
  <path d="M370 421H1147" stroke="#aaa39b"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="46" y="53" fill="#df6f61" font-size="13" letter-spacing="2">TINY SYSTEMS / FIELD NOTE 01</text>
    <text x="46" y="79" fill="#69646c" font-size="11" letter-spacing="1.2">DARWIN · HID 08:02 · HELLO, LAMP</text>

    <text x="31" y="346" fill="none" stroke="#6979b8" stroke-width="1.5" opacity="0.45" font-family="Georgia, Times New Roman, serif" font-size="280">01</text>

    <g transform="translate(46 300)">
      <rect width="244" height="126" rx="2" fill="#fbf8f2" stroke="#27252a" stroke-width="2"/>
      <rect x="9" y="9" width="226" height="108" fill="none" stroke="#b8b0a8"/>
      <text x="23" y="33" fill="#77717a" font-size="10" letter-spacing="1.3">CAPS LOCK / LITTLE LIGHT</text>
      <circle cx="210" cy="29" r="17" fill="#e7c84f" opacity="0.16" filter="url(#lampGlow)"/>
      <circle cx="210" cy="29" r="6" fill="url(#lamp)" filter="url(#lampGlow)"/>
      <text x="23" y="73" fill="#27252a" font-family="Georgia, Times New Roman, serif" font-size="25" font-style="italic">blink blink!</text>
      <text x="23" y="99" fill="#df6f61" font-size="10" letter-spacing="1.1">● LED ONLY / CAPS STATE SAFE</text>
    </g>

    <text x="46" y="461" fill="#706b72" font-size="10" letter-spacing="1">A SMALL COMPUTER COURTESY</text>
    <text x="290" y="461" fill="#706b72" font-size="10" text-anchor="end">REV. 0.1</text>
  </g>

  <g transform="translate(388 0)">
    <text x="0" y="49" fill="#66616a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="1.8">A PHYSICAL NOTIFICATION FOR THE PI OPERATOR</text>

    <text x="-2" y="177" fill="#27252a" font-family="Georgia, Times New Roman, serif" font-size="88" font-style="italic" letter-spacing="-3">Blinkenlights</text>
    <text x="3" y="214" fill="#6979b8" font-family="Georgia, Times New Roman, serif" font-size="22" font-style="italic">your computer has something nice to show you.</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="1.1">
      <text x="3" y="265" fill="#88828a">STATE</text>
      <text x="105" y="265" fill="#27252a">WAITING</text>
      <text x="241" y="265" fill="#88828a">PRIORITY</text>
      <text x="345" y="265" fill="#27252a">10 / FIFO</text>
      <text x="485" y="265" fill="#88828a">MOOD</text>
      <text x="558" y="265" fill="#df6f61">EXCITED</text>
    </g>

    <g transform="translate(3 305)">
      <path d="M0 46H72V6H146V46H212V6H286V46H394V6H468V46H718" fill="none" stroke="#d7d0c7" stroke-width="12"/>
      <path d="M0 46H72V6H146V46H212V6H286V46H394V6H468V46H718" fill="none" stroke="#df6f61" stroke-width="4"/>
      <circle cx="468" cy="6" r="6" fill="#6979b8"/>
      <text x="0" y="76" fill="#918b92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">00:00</text>
      <text x="718" y="76" fill="#918b92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="end">WALL CLOCK / 05:00</text>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
      <text x="3" y="452" fill="#77717a" font-size="11">AGENT.SETTLED</text>
      <text x="150" y="452" fill="#df6f61" font-size="11">→ BLINK BLINK</text>
      <text x="311" y="452" fill="#77717a" font-size="11">→ WELCOME BACK</text>
      <text x="486" y="452" fill="#6979b8" font-size="11">→ QUIET</text>
      <text x="760" y="452" fill="#77717a" font-size="11" text-anchor="end">BLNK/01 :)</text>
    </g>
  </g>
</svg>
